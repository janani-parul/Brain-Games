<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Games Platform</title>
    <meta name="description" content="Play interactive brain games including the addictive GK Quiz.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <header class="main-header">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>
            <h1>Brain<span class="highlight">Games</span></h1>
        </div>
        <p class="subtitle">Challenge your mind, train your brain.</p>
    </header>

    <main class="games-container">
        <div class="game-grid">
            <!-- GK Quiz Card -->
            <a href="quiz.html" class="game-card" id="card-quiz">
                <div class="card-image-wrapper">
                    <div class="card-overlay"></div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="game-icon"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                </div>
                <div class="card-content">
                    <h2>GK Quiz Challenge</h2>
                    <p>Test your general knowledge against the clock. How high can you score?</p>
                    <span class="play-badge">Play Now</span>
                </div>
            </a>

            <!-- Memory Matrix Game -->
            <a href="memory.html" class="game-card locked" id="card-memory">
                <div class="card-image-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="game-icon"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div class="card-content">
                    <h2>Memory Matrix</h2>
                    <p>Train your visual memory and pattern recognition.</p>
                    <span class="lock-badge" id="badge-memory">Locked</span>
                </div>
            </a>
            
            <!-- Math Sprint Game -->
            <a href="math.html" class="game-card locked" id="card-math">
                <div class="card-image-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="game-icon"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div class="card-content">
                    <h2>Math Sprint</h2>
                    <p>Solve fast-paced arithmetic problems.</p>
                    <span class="lock-badge" id="badge-math">Locked</span>
                </div>
            </a>
        </div>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
